<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNIST Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <main class="login-page">
    <section class="helpdesk-shell">
      <header class="helpdesk-header">
        <div class="header-brand" aria-label="SNIST logo">
          <img src="{{ url_for('static', filename='images/Sree304.jpg') }}" alt="SNIST logo" class="header-logo" />
        </div>

        <div class="header-copy">
          <h1>Welcome To Helpdesk !!</h1>
          <p>Login here...</p>
        </div>
      </header>

      <section class="login-stage">
        <div class="login-card">
          <div class="card-header">
            <h2>Sign In</h2>
            <p>Access your SNIST helpdesk account.</p>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              <div class="flash-stack">
                {% for category, message in messages %}
                  <div class="flash-message {{ category }}">{{ message }}</div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}

          <form class="login-form" method="post" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" placeholder="Enter your email" required />
            </label>

            <label class="field">
              <span>Password</span>
              <input type="password" name="password" placeholder="Enter your password" required />
            </label>

            <button type="submit" class="login-btn">Login</button>
          </form>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
